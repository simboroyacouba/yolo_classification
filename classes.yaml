# Configuration des classes pour la détection des toitures cadastrales
# Ce fichier est partagé par tous les modèles (YOLO, Faster R-CNN, SSD, etc.)

# Classes de toitures
# IMPORTANT: L'ordre doit correspondre aux IDs de catégories CVAT/COCO
classes:
  - __background__        # index 0 - NE PAS SUPPRIMER (requis par certains modèles)
  - toiture_tole_ondulee  # index 1 (COCO category id: 1)
  - toiture_tole_bac      # index 2 (COCO category id: 2)
  - toiture_tuile         # index 3 (COCO category id: 3)
  - toiture_dalle         # index 4 (COCO category id: 4)

# Couleurs pour la visualisation (RGB)
colors:
  toiture_tole_ondulee: [255, 0, 0]      # Rouge
  toiture_tole_bac: [0, 255, 0]          # Vert
  toiture_tuile: [0, 0, 255]             # Bleu
  toiture_dalle: [255, 165, 0]           # Orange

# Descriptions (optionnel, pour documentation)
descriptions:
  toiture_tole_ondulee: "Tôle ondulée métallique"
  toiture_tole_bac: "Tôle bac acier"
  toiture_tuile: "Tuiles en terre cuite ou béton"
  toiture_dalle: "Dalle béton (toit plat)"
